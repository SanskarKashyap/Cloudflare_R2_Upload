<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R2 Upload</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 80px auto;
        text-align: center;
        color: #222;
    }
    h1 {
        font-size: 1.4rem;
        margin-bottom: 24px;
    }
    #dropzone {
        border: 2px dashed #999;
        border-radius: 8px;
        padding: 40px 20px;
        cursor: pointer;
    }
    #dropzone.dragover {
        border-color: #333;
        background: #f5f5f5;
    }
    button {
        margin-top: 20px;
        padding: 10px 24px;
        font-size: 1rem;
        cursor: pointer;
    }
    button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
    }
    #status {
        margin-top: 20px;
        font-size: 0.95rem;
        word-break: break-all;
    }
    #status a {
        color: #0060df;
    }
    .error {
        color: #c0392b;
    }
    .success {
        color: #1a7f37;
    }
    #listBtn {
        background: none;
        border: 1px solid #999;
    }
    #fileList {
        margin-top: 24px;
        text-align: left;
        font-size: 0.9rem;
        max-height: 320px;
        overflow-y: auto;
        border-top: 1px solid #ddd;
    }
    #fileList .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 4px;
        border-bottom: 1px solid #eee;
    }
    #fileList .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    #fileList .size {
        color: #666;
        flex-shrink: 0;
    }
    #fileList a {
        color: #0060df;
        text-decoration: none;
    }
</style>
</head>
<body>

<h1>Upload to R2</h1>

<div id="dropzone">
    <p id="filename">Click to select a file</p>
    <input type="file" id="fileInput" hidden>
</div>

<button id="uploadBtn" disabled>Upload</button>
<button id="listBtn">List Files</button>

<div id="status"></div>
<div id="fileList"></div>
<script>
    const dropzone = document.getElementById('dropzone')
    const fileInput = document.getElementById('fileInput')
    const filenameEl = document.getElementById('filename')
    const uploadBtn = document.getElementById('uploadBtn')
    const listBtn = document.getElementById('listBtn')
    const statusEl = document.getElementById('status')
    const fileListEl = document.getElementById('fileList')

    let selectedFile = null

    dropzone.addEventListener('click', () => fileInput.click())

    fileInput.addEventListener('change', () => {
        setFile(fileInput.files[0])
    })

    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault()
        dropzone.classList.add('dragover')
    })

    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover')
    })

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault()
        dropzone.classList.remove('dragover')
        setFile(e.dataTransfer.files[0])
    })

    function setFile(file) {
        if (!file) return
        selectedFile = file
        filenameEl.textContent = file.name
        uploadBtn.disabled = false
        statusEl.textContent = ''
        statusEl.className = ''
    }

    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return

        uploadBtn.disabled = true
        statusEl.className = ''
        statusEl.textContent = 'Uploading...'

        const formData = new FormData()
        formData.append('file', selectedFile)

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData })
            const data = await res.json()

            if (res.ok) {
                statusEl.className = 'success'
                statusEl.innerHTML = data.url
                    ? `Uploaded! <a href="${data.url}" target="_blank">${data.url}</a>`
                    : `Uploaded as "${data.key}"`
            } else {
                statusEl.className = 'error'
                statusEl.textContent = data.error || 'Upload failed.'
            }
        } catch (err) {
            statusEl.className = 'error'
            statusEl.textContent = 'Upload failed: ' + err.message
        } finally {
            uploadBtn.disabled = false
        }
    })

    function escapeHtml(str) {
        const div = document.createElement('div')
        div.textContent = str
        return div.innerHTML
    }

    function formatSize(bytes) {
        if (!bytes) return '0 B'
        const units = ['B', 'KB', 'MB', 'GB']
        let i = 0
        while (bytes >= 1024 && i < units.length - 1) {
            bytes /= 1024
            i++
        }
        return `${bytes.toFixed(i === 0 ? 0 : 1)} ${units[i]}`
    }

    listBtn.addEventListener('click', async () => {
        listBtn.disabled = true
        fileListEl.textContent = 'Loading...'

        try {
            const res = await fetch('/files')
            const data = await res.json()

            if (!res.ok) {
                fileListEl.innerHTML = `<p class="error">${data.error || 'Failed to list files.'}</p>`
                return
            }

            if (!data.files.length) {
                fileListEl.innerHTML = '<p>No files in bucket.</p>'
                return
            }

            fileListEl.innerHTML = data.files.map(f => {
                const safeKey = escapeHtml(f.key)
                const nameHtml = f.url
                    ? `<a href="${escapeHtml(f.url)}" target="_blank">${safeKey}</a>`
                    : safeKey
                return `<div class="row"><span class="name">${nameHtml}</span><span class="size">${formatSize(f.size)}</span></div>`
            }).join('')
        } catch (err) {
            fileListEl.innerHTML = `<p class="error">Failed to list files: ${err.message}</p>`
        } finally {
            listBtn.disabled = false
        }
    })
</script>

</body>
</html>
